<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <style>
      .note {
        font-size: small;
        line-height: 1em;
        color: gray;
      }
      p.note {
        margin: 0.5em 0;
      }
      body {
        padding: 0 1em;
        width: 18em;
        overflow-x: hidden;
        background: #e0e0db;
        font-family: sans-serif;
        > .content {
          padding-bottom: 1em;
        }
      }
      #scroll label {
        margin-right: 0.5em;
      }
      #blocking label, #scroll label {
        display: block;
        line-height: 2em;
      }
      .input-v-align {
        vertical-align: top;
      }
      .hide {
        padding: 0 !important;
        height: 0;
        opacity: 0;
        overflow: hidden;
      }
      .toggle {
        transition: opacity 0.3s ease-in;
      }
      .toggle2 {
        transition: all .2s ease-out;
      }
      .menu {
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }
      .title {
        padding-bottom: 1em;
        border-bottom: solid 1px gray;
      }
      #usage {
        --input-height: 1.7em;
        display: flex;
        flex-direction: column;
      }
      .expandable {
        position: absolute;
        top: var(--input-height);
      }
      .time-picker-wrap {
        display: inline;
        position: relative;
      }
      .time-picker-group {
        position: relative;
        display: flex;
        margin: .1em 0;
        pointer-events: none;
        line-height: var(--input-height);
        label {
          width: 3em;
          font-family: monospace;
        }
      }
      .time-picker-expand {
        color: gray;
        font-size: x-small;
        cursor: pointer;
        user-select: none;
        pointer-events: auto;
        display: inline-block;
      }
      input.time {
        position: relative;
        margin: 0 .5em;
        width: 5em;
        border-radius: 4px;
        pointer-events: auto;
      }
      input.time:placeholder-shown {
        + .clear-button {
          opacity: 0;
          pointer-events: none;
        }
      }
      .clear-button {
        position: absolute;
        right: 1em;
        top: -1px;
        color: lightgray;
        cursor: pointer;
        pointer-events: auto;
        width: 1.5em;
        text-align: right;
        display: inline-block;
      }
      .clear-button:hover {
        color: gray;
      }
      .time-picker {
        position: absolute;
        z-index: 1;
        left: 0;
        top: var(--input-height);
        pointer-events: auto;
        display: flex;
        border-radius: 4px;
        border: 1px solid gray;
        background-color: white;
        ul {
          list-style: none;
          padding: .1em .8em;
          margin: 0;
          height: 10em;
          overflow: scroll;
          scrollbar-width: none;
        }
        li {
          cursor: pointer;
        }
        li:hover {
          background-color: gray;
        }
      }
      /* mobile viewport is actually larger */
      @media (min-width: 22em) {
        .clear-button {
          top: -0.2em;
        }
      }
      @media (prefers-color-scheme: dark) {
        .time-picker {
          background-color: black;
        }
        body {
          color: white;
          background-color: rgb(41, 41, 41);
        }
      }
    </style>
  </head>

  <body>
    <div id="main-menu" class="toggle">
      <p id="menu-blocking" class="menu"><span>Blocked Parts</span><span>></span></p>
      <p id="menu-scroll" class="menu"><span>Scrolling</span><span>></span></p>
      <p id="menu-usage" class="menu require-vis"><span>Usage Limit</span><span>></span></p>
      <p id="menu-speed" class="menu require-nav"><span>Default Speed</span><span>></span></p>
    </div>
    <div id="blocking" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Blocked Parts</span></p>
      <label><input type="checkbox" id="shorts">Shorts on homepage</label>
      <label><input type="checkbox" id="relatedShorts">Shorts in suggestion</label>
      <label><input type="checkbox" id="nextShorts">Scrolling in shorts
        <span class="note mobile-only">*</span>
      </label>
      <label><input type="checkbox" id="playables">YouTube playables</label>
      <label><input type="checkbox" id="related">Suggestion</label>
      <label><input type="checkbox" id="watchNext">Watch next</label>
      <label><input type="checkbox" id="comments">Comment section</label>
      <label class="mobile-only">
        <input type="checkbox" id="switchVideo">Next/previous button <span class="note">*</span>
      </label>
      <p class="note mobile-only">* 1. Not always work<br>
        <span style="opacity: 0;">* </span>2. Right next to the play/pause button
      </p>
    </div>
    <div id="scroll" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Scrolling</span></p>
      <label><input type="radio" id="scroll-none" name="scrolling" value="none">None</label>
      <label><input type="radio" id="scroll-short" name="scrolling" value="short">Short</label>
      <label><input type="radio" id="scroll-long" name="scrolling" value="long">Long</label>
      <label><input type="radio" id="scroll-allow" name="scrolling" value="allow">Allow</label>
      <p class="note require-nav">* Effective on&nbsp;
        <select id="scroll-scope">
          <option value="special" id="current-path">N/A</option>
          <option value="default">entire YouTube site</option>
        </select>
      </p>
    </div>
    <div id="usage" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Usage Limit</span></p>
      <div class="time-picker-group toggle2"><label for="s-x-0">ALL</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-x-0">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
              <!-- generated time picker panels here -->
            </div> ~
            <div class="time-picker-wrap" id="e-x-0">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
            </div>
            <span class="time-picker-expand input-v-align toggle2">▼</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-x-1">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
            </div> ~
            <div class="time-picker-wrap" id="e-x-1">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
            </div>
            <div></div>
            <div class="time-picker-wrap" id="s-x-2">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
            </div> ~
            <div class="time-picker-wrap" id="e-x-2">
              <input placeholder=" " class="time"><span class="clear-button">×</span>
            </div>
          </div>
        </div>
      </div>
      <div>&nbsp;</div><!-- generated time-picker-group's here -->
    </div>
    <div id="speed" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Default Speed</span></p>
      <input type="range" id="playback-rate" min="0.25" max="2" step="0.25">
      <label for="playback-rate" class="input-v-align">1x</label>
      <p class="note">
        * It'll try to avoid altering playback speed of music videos.
      </p>
    </div>
    <script src="shared.js" defer></script><script src="popup.js" defer></script>
  </body>
</html>
