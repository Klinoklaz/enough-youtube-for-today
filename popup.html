<!DOCTYPE html>
<html>
  <head>
    <style>
      fieldset {
        margin: 0.2em 0;
      }
      .note {
        font-size: small;
        line-height: 1em;
        color: gray;
      }
      p.note {
        margin: 0.5em 0;
      }
      body {
        max-width: 420px;
        background: #e0e0db;
      }
      input[type="range"] {
        width: 70%;
      }
      .mr05 {
        margin-right: 0.5em;
      }
      .range-label {
        vertical-align: top;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: white;
          background-color: rgb(41, 41, 41);
        }
      }
      #blocking {
        display: grid;
        gap: 0.4em 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    </style>
  </head>

  <body>
    <fieldset id="blocking">
      <legend>Blocking</legend>
      <label><input type="checkbox" id="shorts">Shorts on homepage</label>
      <label><input type="checkbox" id="relatedShorts">Shorts in suggestion</label>
      <label><input type="checkbox" id="nextShorts">Scrolling in shorts</label>
      <label><input type="checkbox" id="playables">YouTube playables</label>
      <label><input type="checkbox" id="related">Suggestion</label>
      <label><input type="checkbox" id="watchNext">Watch next</label>
      <label><input type="checkbox" id="comments">Comment section</label>
    </fieldset>

    <fieldset>
      <legend>Screen Scrolling</legend>
      <label for="scroll-none" class="mr05">
        <input type="radio" id="scroll-none" name="scrolling" value="none">None
      </label>
      <label for="scroll-short" class="mr05">
        <input type="radio" id="scroll-short" name="scrolling" value="short">Short
      </label>
      <label for="scroll-long" class="mr05">
        <input type="radio" id="scroll-long" name="scrolling" value="long">Long
      </label>
      <label for="scroll-allow" class="mr05">
        <input type="radio" id="scroll-allow" name="scrolling" value="allow">Allow
      </label>
      <p class="note">
        <label for="scroll-scope" class="require-nav mr05">* Effective on</label>
        <select id="scroll-scope" class="require-nav">
          <option value="special">current page type</option>
          <option value="default">entire ytb site</option>
        </select>
      </p>
    </fieldset>

    <fieldset class="require-vis">
      <legend>Usage Limit</legend>
      <input type="range" id="daily-limit" min="0" max="180" step="1">
      <label for="daily-limit" class="range-label">
        Daily <span class="note" id="daily-limit-label"></span>
      </label>
      <div class="vertical-pad"></div>
      <input type="range" id="weekly-limit" min="0" max="1440" step="1">
      <label for="weekly-limit" class="range-label">
        Weekly <span class="note" id="weekly-limit-label"></span>
      </label>
      <p class="note">
        * You can switch to a non-YouTube tab or minimize the browser to pause timing.
      </p>
    </fieldset>

    <fieldset class="require-nav">
      <legend>Default Speed</legend>
      <input type="range" id="playback-rate" min="0.25" max="2" step="0.25">
      <label for="playback-rate" class="range-label">1x</label>
      <p class="note">
        * It'll try to avoid altering playback speed of music videos.
      </p>
    </fieldset>

    <script src="shared.js" defer></script>
    <script src="popup.js" defer></script>
  </body>
</html>
