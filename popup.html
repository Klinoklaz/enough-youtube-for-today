<!DOCTYPE html>
<html>
  <head>
    <style>
      fieldset {
        margin: 0.2em 0;
      }
      .note {
        font-size: small;
        line-height: 1em;
        color: gray;
      }
      p.note {
        margin: 0.5em 0;
      }
      body {
        padding: 0 1em;
        overflow-x: hidden;
        width: 18em;
        background: #e0e0db;
        > .content {
          padding-bottom: 1em;
        }
      }
      #scroll label {
        margin-right: 0.5em;
      }
      #blocking label, #scroll label {
        display: block;
        line-height: 2em;
      }
      .range-label {
        vertical-align: top;
      }
      .hide {
        padding: 0 !important;
        height: 0;
        opacity: 0;
        overflow: hidden;
      }
      .toggle {
        transition: opacity 0.3s ease-in;
      }
      .toggle2 {
        transition: all .2s ease-out;
      }
      .menu {
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }
      .title {
        padding-bottom: 1em;
        border-bottom: solid 1px gray;
      }
      #usage {
        --input-height: 1.7em;
        display: flex;
        flex-direction: column;
      }
      .expandable {
        position: absolute;
        top: var(--input-height);
      }
      .time-picker-wrap {
        display: inline;
        position: relative;
      }
      .time-picker-group {
        position: relative;
        display: flex;
        margin: .1em 0;
        pointer-events: none;
        line-height: var(--input-height);
        label {
          width: 3em;
          font-family: monospace;
        }
      }
      .time-picker-expand {
        color: gray;
        cursor: pointer;
        pointer-events: auto;
        display: inline-block;
      }
      input.time {
        position: relative;
        margin: 0 .5em;
        width: 5em;
        border-radius: 4px;
        pointer-events: auto;
      }
      .time-picker {
        position: absolute;
        z-index: 1;
        left: 0;
        top: var(--input-height);
        pointer-events: auto;
        display: flex;
        border-radius: 4px;
        border: 1px solid gray;
        background-color: white;
        ul {
          list-style: none;
          padding: .1em .8em;
          margin: 0;
          height: 10em;
          overflow: scroll;
          scrollbar-width: none;
        }
        li {
          cursor: pointer;
        }
        li:hover {
          background-color: gray;
        }
      }
      @media (prefers-color-scheme: dark) {
        .time-picker {
          background-color: black;
        }
        body {
          color: white;
          background-color: rgb(41, 41, 41);
        }
      }
    </style>
  </head>

  <body>
    <div id="main-menu" class="toggle">
      <p id="menu-blocking" class="menu"><span>Blocked Parts</span><span>></span></p>
      <p id="menu-scroll" class="menu"><span>Scrolling</span><span>></span></p>
      <p id="menu-usage" class="menu require-vis"><span>Usage Limit</span><span>></span></p>
      <p id="menu-speed" class="menu require-nav"><span>Default Speed</span><span>></span></p>
    </div>
    <div id="blocking" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Blocked Parts</span></p>
      <label><input type="checkbox" id="shorts">Shorts on homepage</label>
      <label><input type="checkbox" id="relatedShorts">Shorts in suggestion</label>
      <label><input type="checkbox" id="nextShorts">Scrolling in shorts</label>
      <label><input type="checkbox" id="playables">YouTube playables</label>
      <label><input type="checkbox" id="related">Suggestion</label>
      <label><input type="checkbox" id="watchNext">Watch next</label>
      <label><input type="checkbox" id="comments">Comment section</label>
    </div>
    <div id="scroll" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Scrolling</span></p>
      <label><input type="radio" id="scroll-none" name="scrolling" value="none">None</label>
      <label><input type="radio" id="scroll-short" name="scrolling" value="short">Short</label>
      <label><input type="radio" id="scroll-long" name="scrolling" value="long">Long</label>
      <label><input type="radio" id="scroll-allow" name="scrolling" value="allow">Allow</label>
      <p class="note require-nav">* Effective on&nbsp;
        <select id="scroll-scope">
          <option value="special" id="current-path">N/A</option>
          <option value="default">entire YouTube site</option>
        </select>
      </p>
    </div>
    <div id="usage" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Usage Limit</span></p>
      <div class="time-picker-group toggle2"><label for="s-x-0">ALL</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-x-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-x-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-x-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-x-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-x-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-x-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div>&nbsp;</div>
      <div class="time-picker-group toggle2"><label for="s-0-0">SUN</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-0-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-0-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-0-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-0-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-0-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-0-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-1-0">MON</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-1-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-1-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-1-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-1-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-1-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-1-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-2-0">TUE</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-2-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-2-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-2-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-2-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-2-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-2-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-3-0">WED</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-3-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-3-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-3-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-3-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-3-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-3-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-4-0">THU</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-4-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-4-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-4-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-4-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-4-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-4-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-5-0">FRI</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-5-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-5-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-5-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-5-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-5-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-5-2"><input class="time"></div>
          </div>
        </div>
      </div>
      <div class="time-picker-group toggle2"><label for="s-6-0">SAT</label>
        <div>
          <div>
            <div class="time-picker-wrap" id="s-6-0"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-6-0"><input class="time"></div>
            <span class="time-picker-expand toggle2">&#x2BC6;</span>
          </div>
          <div class="hide toggle2 expandable">
            <div class="time-picker-wrap" id="s-6-1"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-6-1"><input class="time"></div>
            <div></div>
            <div class="time-picker-wrap" id="s-6-2"><input class="time"></div> ~
            <div class="time-picker-wrap" id="e-6-2"><input class="time"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="speed" class="hide content toggle">
      <p class="menu title"><span>&lt;</span><span>Default Speed</span></p>
      <input type="range" id="playback-rate" min="0.25" max="2" step="0.25">
      <label for="playback-rate" class="range-label">1x</label>
      <p class="note">
        * It'll try to avoid altering playback speed of music videos.
      </p>
    </div>
    <script src="shared.js" defer></script><script src="popup.js" defer></script>
  </body>
</html>
