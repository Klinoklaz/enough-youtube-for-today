<!DOCTYPE html>
<html>
  <head>
    <style>
      fieldset {
        margin: 0.2em 0;
      }
      .note {
        font-size: small;
        line-height: 1em;
        color: gray;
      }
      p.note {
        margin: 0.5em 0;
      }
      body {
        max-width: 420px;
        background: #e0e0db;
      }
      .range-label {
        vertical-align: top;
      }
      .require-nav, .require-vis {
        display: none;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: white;
          background-color: rgb(41, 41, 41);
        }
      }
      #blocking {
        display: grid;
        gap: 0.4em 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    </style>
  </head>

  <body>
    <fieldset id="blocking">
      <legend>Blocking</legend>
      <label><input type="checkbox" id="shorts" name="shorts">
        Shorts on homepage
      </label>
      <label><input type="checkbox" id="relatedShorts" name="related-shorts">
        Shorts in suggestion
      </label>
      <label><input type="checkbox" id="nextShorts" name="next-shorts">
        Scrolling in shorts
      </label>
      <label><input type="checkbox" id="playables" name="playables">
        YouTube playables
      </label>
      <label><input type="checkbox" id="related" name="related">
        Suggestion
      </label>
      <label><input type="checkbox" id="watchNext" name="watch-next">
        Watch next
      </label>
      <label><input type="checkbox" id="comments" name="comments">
        Comment section
      </label>
    </fieldset>

    <fieldset>
      <legend>Screen Scrolling</legend>
      <input type="radio" id="scroll-none" name="scrolling" value="none">
      <label for="scroll-none">None</label>
      <input type="radio" id="scroll-partial" name="scrolling" value="partial">
      <label for="scroll-partial">Partial</label>
      <input type="radio" id="scroll-allow" name="scrolling" value="allow">
      <label for="scroll-allow">Allow</label>
      <p class="note" class="require-nav">
        * This doesn't affect watch history, playlists, search results, etc.
      </p>
    </fieldset>

    <fieldset class="require-vis">
      <legend>Usage Limit</legend>
      <input type="range" id="daily-limit" name="daily-limit"
        min="0" max="180" step="1">
      <label for="daily-limit" class="range-label">
        Daily <span class="note" id="daily-limit-label"></span>
      </label>
      <div class="vertical-pad"></div>
      <input type="range" id="weekly-limit" name="weekly-limit"
        min="0" max="1440" step="1">
      <label for="weekly-limit" class="range-label">
        Weekly <span class="note" id="weekly-limit-label"></span>
      </label>
      <p class="note">
        * You can switch to a non-YouTube tab or minimize the browser to pause timing.
      </p>
    </fieldset>

    <fieldset class="require-nav">
      <legend>Default Speed</legend>
      <input type="range" id="playback-rate" name="playback-rate"
        min="0.25" max="2" step="0.25">
      <label for="playback-rate" class="range-label">1x</label>
      <p class="note">
        * It'll try to avoid altering playback speed of music video.
      </p>
    </fieldset>

    <script src="shared.js" defer></script>
    <script src="popup.js" defer></script>
  </body>
</html>
